<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme & mobile status bar -->
    <meta name="theme-color" content="#0064ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="절세비서" />

    <title>절세비서</title>
    <meta
      name="description"
      content="나에게 맞는 절세 우선순위를 1분 만에 찾아드려요. 연금저축·IRP·ISA부터 해외주식까지, 절세비서가 추천합니다."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="절세비서" />
    <meta property="og:title" content="절세비서" />
    <meta
      property="og:description"
      content="나에게 맞는 절세 우선순위를 1분 만에 찾아드려요."
    />
    <meta property="og:url" content="https://www.save-tax.me/" />
    <meta property="og:image" content="https://www.save-tax.me/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="절세비서" />
    <meta
      name="twitter:description"
      content="나에게 맞는 절세 우선순위를 1분 만에 찾아드려요."
    />
    <meta name="twitter:image" content="https://www.save-tax.me/og-image.png" />
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #0064ff;
        z-index: 9999;
      }
      #app-splash .splash-mascot {
        width: 140px;
        height: 140px;
        animation: splash-bob 1.4s ease-in-out infinite;
      }
      #app-splash .splash-spinner {
        width: 34px;
        height: 34px;
        border: 4px solid rgba(255, 255, 255, 0.45);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-splash">
        <img class="splash-mascot" src="/mascot.png" alt="절세비서" />
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
